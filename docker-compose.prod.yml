version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finishline-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
