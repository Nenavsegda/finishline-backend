version: '3.9'

networks:
  finishline-net:
    driver: bridge

volumes:
  mysql-data:

services:
  db:
    image: mysql:8.0
    container_name: finishline-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finishline}
      MYSQL_USER: ${MYSQL_USER:-finishline}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finishlinepass}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - finishline-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finishline-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-finishline}
      DB_USER: ${MYSQL_USER:-finishline}
      DB_PASSWORD: ${MYSQL_PASSWORD:-finishlinepass}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finishline-net

  frontend:
    build:
      context: ../finishline-frontend
      dockerfile: Dockerfile
    container_name: finishline-frontend
    restart: unless-stopped
    env_file:
      - ../finishline-frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - finishline-net
